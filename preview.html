<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩虹班的小小回憶錄</title>

<style>
body{
  margin:0;
  font-family:"Noto Sans TC", "Microsoft JhengHei", sans-serif;
  background:linear-gradient(180deg,#fff8c9,#ffe0f0,#dff7ff);
  color:#4a3b2f;
  text-align:center;
}

section{
  min-height:100vh;
  padding:45px 20px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1{
  font-size:36px;
  color:#ff7a00;
  margin-bottom:10px;
}

h2{
  font-size:28px;
  color:#ff6f91;
}

p{
  font-size:20px;
  line-height:1.9;
}

.card{
  background:white;
  border-radius:30px;
  padding:25px;
  max-width:560px;
  width:90%;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  border:5px dashed #ffd36e;
}

img, video{
  width:100%;
  border-radius:22px;
  margin-top:15px;
}

button{
  margin-top:25px;
  background:#ff9f1c;
  color:white;
  border:none;
  padding:16px 28px;
  border-radius:40px;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 5px 0 #d97800;
}

.rainbow{
  font-size:60px;
  animation:bounce 1.5s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

.star{
  position:fixed;
  font-size:24px;
  animation:float 5s infinite;
  opacity:0.7;
}

.s1{top:10%; left:8%;}
.s2{top:25%; right:10%;}
.s3{bottom:20%; left:12%;}
.s4{bottom:12%; right:15%;}

@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-20px) rotate(15deg);}
}

.footer{
  font-size:18px;
  color:#7a5c3c;
}
</style>
</head>

<body>

<div class="star s1">⭐</div>
<div class="star s2">🎈</div>
<div class="star s3">🌟</div>
<div class="star s4">☁️</div>

<section>
  <div class="rainbow">🌈</div>
  <h1>彩虹班的小小回憶錄</h1>
  <p>
    2025－2026<br>
    我們一起長大的故事
  </p>
  <button onclick="document.getElementById('photo').scrollIntoView({behavior:'smooth'})">
    📖 開始看回憶
  </button>
</section>

<section id="photo">
  <div class="card">
    <h2>📸 我們的彩虹班</h2>
    <p>每一個笑容，都是最珍貴的小寶藏。</p>
    <img src="class.jpg">
  </div>
</section>

<section>
  <div class="card">
    <h2>💌 老師的小信封</h2>
    <p>
      親愛的彩虹班寶貝們：<br><br>
      這一年，我們一起玩、一起笑、一起長大。<br>
      老師看見你們學會自己穿鞋、收玩具、排隊，
      也看見你們慢慢變得更勇敢。<br><br>
      每一位寶貝都是彩虹班最可愛的顏色。<br>
      希望你們帶著笑容，繼續開心長大。<br><br>
      ❤️ 愛你們的老師
    </p>
  </div>
</section>

<section>
  <div class="card">
    <h2>🎬 成長魔法影片</h2>
    <p>一起看看彩虹班這一年的快樂時光吧！</p>
    <video controls>
      <source src="class-video.mp4" type="video/mp4">
      您的瀏覽器不支援影片播放。
    </video>
  </div>
</section>

<section>
  <div class="rainbow">🎉</div>
  <h2>彩虹班升級成功！</h2>
  <p>
    謝謝寶貝們帶來滿滿的笑聲。<br>
    我們中班見！
  </p>
  <p class="footer">🌈 彩虹班永遠愛你們 🌈</p>
</section>

</body>
</html>
