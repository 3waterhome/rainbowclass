<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩虹班的小小回憶錄</title>

<style>
body{
  margin:0;
  font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
  background:linear-gradient(180deg,#fff8c9,#ffe0f0,#dff7ff);
  color:#4a3b2f;
  text-align:center;
}

section{
  min-height:100vh;
  padding:45px 20px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1{font-size:36px;color:#ff7a00;}
h2{font-size:28px;color:#ff6f91;}
p{font-size:20px;line-height:1.8;}

.card{
  background:white;
  border-radius:30px;
  padding:25px;
  max-width:560px;
  width:90%;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  border:5px dashed #ffd36e;
}

button{
  margin-top:20px;
  background:#ff9f1c;
  color:white;
  border:none;
  padding:15px 28px;
  border-radius:40px;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 5px 0 #d97800;
}

.rainbow{
  font-size:60px;
  animation:bounce 1.5s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* 照片輪播 */
.slider-box{
  position:relative;
  overflow:hidden;
  border-radius:22px;
  margin-top:15px;
}

.slider{
  display:flex;
  transition:transform 0.5s ease;
}

.slider img{
  min-width:100%;
  width:100%;
  border-radius:22px;
  object-fit:cover;
  cursor:pointer;
}

.counter{
  position:absolute;
  top:12px;
  right:12px;
  background:rgba(0,0,0,0.55);
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:16px;
}

.dots{
  margin-top:15px;
}

.dot{
  display:inline-block;
  width:12px;
  height:12px;
  margin:0 5px;
  background:#ffd36e;
  border-radius:50%;
  opacity:0.4;
  cursor:pointer;
}

.dot.active{
  opacity:1;
  background:#ff7a00;
}

/* 左右按鈕 */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.8);
  border:none;
  font-size:26px;
  border-radius:50%;
  width:42px;
  height:42px;
  cursor:pointer;
  box-shadow:none;
  margin:0;
  padding:0;
  color:#ff7a00;
}

.prev{left:10px;}
.next{right:10px;}

/* 全螢幕放大 */
.lightbox{
  display:none;
  position:fixed;
  z-index:999;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:92%;
  max-height:85%;
  border-radius:20px;
}

.close{
  position:absolute;
  top:25px;
  right:30px;
  color:white;
  font-size:42px;
  cursor:pointer;
}

video{
  width:100%;
  border-radius:22px;
  margin-top:15px;
}

.star{
  position:fixed;
  font-size:24px;
  animation:float 5s infinite;
  opacity:0.7;
}

.s1{top:10%; left:8%;}
.s2{top:25%; right:10%;}
.s3{bottom:20%; left:12%;}
.s4{bottom:12%; right:15%;}

@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-20px) rotate(15deg);}
}
</style>
</head>

<body>

<div class="star s1">⭐</div>
<div class="star s2">🎈</div>
<div class="star s3">🌟</div>
<div class="star s4">☁️</div>

<section>
  <div class="rainbow">🌈</div>
  <h1>彩虹班的小小回憶錄</h1>
  <p>2025－2026<br>我們一起長大的故事</p>
  <button onclick="document.getElementById('photo').scrollIntoView({behavior:'smooth'})">
    📖 開始看回憶
  </button>
</section>

<section id="photo">
  <div class="card">
    <h2>📸 我們的彩虹班</h2>
    <p>左右滑動照片，看看我們的快樂時光吧！</p>

    <div class="slider-box" id="sliderBox">
      <div class="counter" id="counter">第 1 / 5 張</div>

      <div class="slider" id="slider">
        <img src="photo1.jpg" onclick="openLightbox(this.src)">
        <img src="photo2.jpg" onclick="openLightbox(this.src)">
        <img src="photo3.jpg" onclick="openLightbox(this.src)">
        <img src="photo4.jpg" onclick="openLightbox(this.src)">
        <img src="photo5.jpg" onclick="openLightbox(this.src)">
      </div>

      <button class="arrow prev" onclick="prevSlide()">‹</button>
      <button class="arrow next" onclick="nextSlide()">›</button>
    </div>

    <div class="dots">
      <span class="dot active" onclick="goSlide(0)"></span>
      <span class="dot" onclick="goSlide(1)"></span>
      <span class="dot" onclick="goSlide(2)"></span>
      <span class="dot" onclick="goSlide(3)"></span>
      <span class="dot" onclick="goSlide(4)"></span>
    </div>
  </div>
</section>

<section>
  <div class="card">
    <h2>💌 老師的小信封</h2>
    <p>
      親愛的彩虹班寶貝們：<br><br>
      這一年，我們一起玩、一起笑、一起長大。<br>
      老師看見你們學會自己穿鞋、收玩具、排隊，
      也看見你們慢慢變得更勇敢。<br><br>
      每一位寶貝都是彩虹班最可愛的顏色。<br>
      希望你們帶著笑容，繼續開心長大。<br><br>
      ❤️ 愛你們的老師
    </p>
  </div>
</section>

<section>
  <div class="card">
    <h2>🎬 成長魔法影片</h2>
    <p>一起看看彩虹班這一年的快樂時光吧！</p>
    <video controls>
      <source src="class-video.mp4" type="video/mp4">
      您的瀏覽器不支援影片播放。
    </video>
  </div>
</section>

<section>
  <div class="rainbow">🎉</div>
  <h2>彩虹班升級成功！</h2>
  <p>謝謝寶貝們帶來滿滿的笑聲。<br>我們中班見！</p>
</section>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="close">&times;</span>
  <img id="lightboxImg">
</div>

<script>
let currentIndex = 0;
const totalSlides = 5;
const slider = document.getElementById("slider");
const counter = document.getElementById("counter");
const dots = document.querySelectorAll(".dot");

function updateSlide(){
  slider.style.transform = `translateX(-${currentIndex * 100}%)`;
  counter.innerText = `第 ${currentIndex + 1} / ${totalSlides} 張`;

  dots.forEach((dot,index)=>{
    dot.classList.toggle("active", index === currentIndex);
  });
}

function nextSlide(){
  currentIndex = (currentIndex + 1) % totalSlides;
  updateSlide();
}

function prevSlide(){
  currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
  updateSlide();
}

function goSlide(index){
  currentIndex = index;
  updateSlide();
}

// 自動輪播，每 3 秒換一張
setInterval(nextSlide, 3000);

// 手機左右滑動
let startX = 0;

document.getElementById("sliderBox").addEventListener("touchstart", function(e){
  startX = e.touches[0].clientX;
});

document.getElementById("sliderBox").addEventListener("touchend", function(e){
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    nextSlide();
  }else if(endX - startX > 50){
    prevSlide();
  }
});

// 點照片放大全螢幕
function openLightbox(src){
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightboxImg").src = src;
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
